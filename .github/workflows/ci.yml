name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet core
        run: cd core && go vet ./...

      - name: Vet kurrentdb
        run: cd kurrentdb && go vet ./...

      - name: Vet otel
        run: cd otel && go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l core/ kurrentdb/ otel/)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, kurrentdb, otel]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build ${{ matrix.module }}
        run: cd ${{ matrix.module }} && go build ./...

  test-core:
    name: Test core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run core tests
        run: cd core && go test -race -count=1 ./...

  test-otel:
    name: Test otel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run otel tests
        run: cd otel && go test -race -count=1 ./...

  test-kurrentdb:
    name: Test kurrentdb
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run kurrentdb integration tests
        run: cd kurrentdb && go test -race -count=1 -timeout 300s ./...
